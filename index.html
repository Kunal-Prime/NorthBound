<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetable Rebel</title>
  <style>
    body { font-family: system-ui; padding: 40px; background: #0f0f0f; color: #0f0; }
    button { padding: 12px 24px; font-size: 16px; background: #0f0; color: black; border: none; cursor: pointer; }
    pre { background: #111; padding: 20px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Calling My Live API</h1>
  <button onclick="callAPI()">Parse Sample Timetable</button>
  <pre id="result"></pre>


  <script>
    async function callAPI() {
      const resultEl = document.getElementById('result');
      resultEl.textContent = "Calling API...";

      const sampleText = `
    Monday 9:00 AM - Math
    Tuesday 11:00 AM - Physics
    Wednesday 2:00 PM - Chemistry
    `;

      try {
        const response = await fetch("https://northbound-1.onrender.com/smart-parse", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: sampleText })
        });

        const raw = await response.text();

        if (!response.ok) {
          resultEl.textContent = `HTTP ${response.status}\n\n${raw}`;
          return;
        }

        try {
          const data = JSON.parse(raw);
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch {
          resultEl.textContent = raw;
        }

      } catch (err) {
        resultEl.textContent = "FETCH ERROR: " + err.message;
      }
    }
  </script>
</body>
</html>
